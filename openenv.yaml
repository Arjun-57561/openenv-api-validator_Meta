name: api_response_validator
version: "1.0.0"
description: >
  OpenEnv environment where an AI agent validates HTTP API responses
  against contracts, schema rules, and REST best practices.

observation_space:
  type: text
  description: "HTTP API response scenario including endpoint, headers, and body."

action_space:
  type: text
  description: "Validation verdict with reasoning (VALID / INVALID / PARTIAL VALID)."

reward_range: [0.001, 0.999]

tasks:
  - id: easytask
    name: "Basic API Response Validation"
    difficulty: easy
    description: "Validate simple HTTP responses – status codes and JSON structure."
    reward_threshold: 0.55

  - id: mediumtask
    name: "Schema & Business Rule Validation"
    difficulty: medium
    description: "Identify schema violations, type errors, and business rule breaches."
    reward_threshold: 0.50

  - id: hardtask
    name: "Complex API Contract Validation"
    difficulty: hard
    description: "Evaluate payments, batch, SSE streams, and webhook patterns."
    reward_threshold: 0.45

endpoints:
  reset:  "/reset"
  state:  "/state"
  step:   "/step"
  health: "/health"
